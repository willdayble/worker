name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so gitleaks can scan it
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --if-present build   # build @workerchat/shared so app typechecks resolve its dist
      - run: pnpm -r --if-present lint
      - run: pnpm -r --if-present typecheck
      - run: pnpm -r --if-present test
      - name: RLS policy guard
        run: bash scripts/check-rls.sh
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
